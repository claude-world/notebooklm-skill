name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check scripts/ mcp_server/

      - name: Type check imports
        run: python -c "from mcp_server.server import main; from scripts.notebooklm_client import main; from scripts.pipeline import main; print('All imports OK')"

      - name: Unit tests
        run: pytest tests/ -q --tb=short

      - name: CLI entry points
        run: |
          notebooklm-skill --help > /dev/null
          notebooklm-pipeline --help > /dev/null
          notebooklm-mcp --help > /dev/null

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          notebooklm-skill --help > /dev/null
          notebooklm-pipeline --help > /dev/null
          notebooklm-mcp --help > /dev/null

  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JSON files
        run: python -c "import json; [json.load(open(f)) for f in ['.mcp.json']]; print('JSON OK')"

      - name: Check pyproject.toml
        run: |
          python3 -c "
          import tomllib
          d = tomllib.load(open('pyproject.toml','rb'))
          assert d['project']['version'], 'Missing version'
          assert d['project']['scripts'], 'Missing scripts'
          print(f'pyproject.toml OK — v' + d['project']['version'])
          "

      - name: Check no stale mcp-server refs in docs
        run: |
          if grep -rn 'mcp-server/' README.md README.zh-TW.md SKILL.md docs/ AGENTS.md 2>/dev/null; then
            echo "ERROR: Found stale mcp-server/ references" && exit 1
          fi
          echo "No stale mcp-server/ references"
